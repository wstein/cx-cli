name: Publish npm package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional package version for manual publish.'
        required: false
        default: ''
        type: string

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package version matches tag or input
        run: |
          set -euo pipefail
          pkg_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          if [ "${GITHUB_EVENT_NAME}" = 'workflow_dispatch' ]; then
            tag_version="${{ github.event.inputs.version }}"
            if [ -z "$tag_version" ]; then
              echo "No version input provided; using package.json version $pkg_version."
              exit 0
            fi
          else
            tag_version=${GITHUB_REF#refs/tags/v}
          fi
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Package version ($pkg_version) does not match git tag or provided version ($tag_version)."
            exit 1
          fi

      - name: Verify package
        run: bun run verify

  publish:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Setup npm auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
