name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (vX.Y.Z) to finalize again.'
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

env:
  BUN_MIN_VERSION: 1.3.12

permissions:
  contents: read
  actions: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release-version.outputs.version }}
      release_tag: ${{ steps.release-version.outputs.tag }}
      release_sha: ${{ steps.release-version.outputs.sha }}
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Determine release version
        id: release-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin develop:refs/remotes/origin/develop --force

          if [ "${GITHUB_EVENT_NAME}" = 'workflow_dispatch' ]; then
            tag_name="${{ github.event.inputs.tag }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$tag_name" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Release finalization requires a semantic version tag like v0.4.0 from the closed candidate line."
            exit 1
          fi

          if ! git rev-parse --verify "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "Tag $tag_name does not exist in this checkout."
            exit 1
          fi

          tag_sha=$(git rev-list -n 1 "refs/tags/$tag_name")
          head_sha=$(git rev-parse HEAD)
          if [ "$tag_sha" != "$head_sha" ]; then
            echo "Checked-out commit $head_sha does not match tag $tag_name ($tag_sha)."
            exit 1
          fi

          if ! git branch -r --contains "$head_sha" | grep -Eq 'origin/develop$'; then
            echo "Release tag $tag_name must point at a certified commit from develop."
            exit 1
          fi

          ci_runs=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/runs?head_sha=$head_sha&event=push&status=completed&per_page=100")

          if ! printf '%s' "$ci_runs" | jq -e '.workflow_runs[] | select(.name=="CI" and .head_branch=="develop" and .conclusion=="success")' >/dev/null; then
            echo "Tagged commit $head_sha has not passed the required develop CI workflow."
            exit 1
          fi

          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=${tag_name#v}" >> "$GITHUB_OUTPUT"
          echo "sha=$head_sha" >> "$GITHUB_OUTPUT"

  tarball:
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ needs.gate.outputs.release_version }}
      npm_tarball_name: ${{ steps.pack.outputs.npm_tarball_name }}
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.gate.outputs.release_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package version matches tag or input
        run: |
          set -euo pipefail
          pkg_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          requested_version="${{ needs.gate.outputs.release_version }}"
          if [ "$pkg_version" != "$requested_version" ]; then
            echo "Package version ($pkg_version) does not match git tag or provided version ($requested_version)."
            exit 1
          fi

      - name: Build package
        run: bun run build

      - name: Pack release tarball
        id: pack
        run: |
          set -euo pipefail
          mkdir -p tarball-artifacts
          npm pack --json --pack-destination tarball-artifacts > tarball-artifacts/pack.json
          npm_tarball_name=$(node -p "JSON.parse(require('fs').readFileSync('tarball-artifacts/pack.json', 'utf8'))[0].filename")
          rm tarball-artifacts/pack.json
          echo "npm_tarball_name=$npm_tarball_name" >> $GITHUB_OUTPUT

      - name: Generate release integrity SBOM
        run: bun run integrity

      - name: Stage release integrity file
        run: |
          set -euo pipefail
          cp dist/release-integrity.json tarball-artifacts/release-integrity.json

      - name: Upload release artifacts
        # Keep the packed npm tarball and generated formula together so both publish jobs use the same release payload.
        uses: actions/upload-artifact@v4
        with:
          name: tarball-artifacts
          path: tarball-artifacts
          if-no-files-found: error
          retention-days: 1

  npm:
    needs:
      - gate
      - tarball
    runs-on: ubuntu-latest
    environment: node
    steps:
      - name: Download release artifacts
        # Reuse the same tarball payload that npm published when generating the Homebrew formula.
        uses: actions/download-artifact@v4
        with:
          name: tarball-artifacts
          path: tarball-artifacts

      - name: Preflight npm secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required for npm publish."
            exit 1
          fi

      - name: Setup npm auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Publish to npm
        run: npm publish --access public "./tarball-artifacts/${{ needs.tarball.outputs.npm_tarball_name }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  homebrew:
    needs:
      - gate
      - tarball
      - npm
    runs-on: ubuntu-latest
    environment: homebrew
    permissions:
      contents: write
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: tarball-artifacts
          path: tarball-artifacts

      - name: Preflight tap secret
        env:
          HOMEBREW_TAP_PUSH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_PUSH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_PUSH_TOKEN secret is required to authenticate the push to wstein/homebrew-tap."
            exit 1
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: wstein/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: homebrew-tap

      # Bun is required here because this job generates the Homebrew formula from the packed tarball.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Generate Homebrew formula
        run: |
          bun run scripts/generate-homebrew-formula.js "${{ needs.tarball.outputs.release_version }}" --tarball "tarball-artifacts/${{ needs.tarball.outputs.npm_tarball_name }}" --output tarball-artifacts/cx-cli.rb

      - name: Update tap formula
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -b main
          mkdir -p Formula
          cp ../tarball-artifacts/cx-cli.rb Formula/cx-cli.rb
          git add Formula/cx-cli.rb
          if git diff --cached --quiet -- Formula/cx-cli.rb; then
            echo "No formula updates required."
            exit 0
          fi
          git commit -m "chore(homebrew): update cx-cli formula for v${{ needs.tarball.outputs.release_version }}"
          git push origin main

  release-assets:
    needs:
      - gate
      - tarball
      - npm
      - homebrew
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.gate.outputs.release_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: tarball-artifacts
          path: tarball-artifacts

      - name: Generate Homebrew formula release asset
        run: |
          bun run scripts/generate-homebrew-formula.js "${{ needs.tarball.outputs.release_version }}" --tarball "tarball-artifacts/${{ needs.tarball.outputs.npm_tarball_name }}" --output tarball-artifacts/cx-cli.rb

      - name: Render GitHub release body
        env:
          RELEASE_TAG: ${{ needs.gate.outputs.release_tag }}
        run: |
          node -e "const fs=require('fs'); const template=fs.readFileSync('.github/release-body-template.md','utf8'); fs.writeFileSync('tarball-artifacts/release-body.md', template.replaceAll('{{RELEASE_TAG}}', process.env.RELEASE_TAG));"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.release_tag }}
          body_path: tarball-artifacts/release-body.md
          files: |
            tarball-artifacts/*.tgz
            tarball-artifacts/release-integrity.json
            tarball-artifacts/cx-cli.rb

  promote-main:
    needs:
      - gate
      - release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.gate.outputs.release_sha }}

      - name: Fast-forward main to released commit
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git merge --ff-only "${{ needs.gate.outputs.release_sha }}"
          git push origin main
