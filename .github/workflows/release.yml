name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package release artifact
        run: |
          export ARTIFACT_NAME=cx-cli-${{ github.ref_name }}.tar.gz
          mkdir -p release/bin
          cp scripts/release-bin-cx.js release/bin/cx
          chmod +x release/bin/cx
          mkdir -p release/dist
          cp -R dist/* release/dist/
          cp package.json README.md LICENSE release/
          tar --sort=name \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.github \
            --exclude=homebrew \
            --exclude=homebrew-cx \
            -czf $ARTIFACT_NAME \
            -C release .
          mv $ARTIFACT_NAME release/

      - name: Upload GitHub Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: cx-cli-${{ github.ref_name }}-tarball
          path: release/cx-cli-${{ github.ref_name }}.tar.gz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: release/cx-cli-${{ github.ref_name }}.tar.gz
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
