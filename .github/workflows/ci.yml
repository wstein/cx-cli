name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUN_MIN_VERSION: 1.3.11

jobs:
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint, format, and typecheck
        run: bun run lint && bun run format:check && bun run check

      - name: Build
        run: bun run build

      - name: Guard fast unit lane composition
        run: bun run ci:guard:fast-lane

      - name: Restore fast-lane timing state
        uses: actions/cache/restore@v4
        with:
          path: .ci/fast-lane-monitor-state.json
          key: fast-lane-monitor-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fast-lane-monitor-${{ github.ref_name }}-

      - name: Run monitored fast unit test lane
        run: bun run ci:test:fast:monitored

      - name: Generate observability dashboard
        if: always()
        run: bun run ci:report:observability

      - name: Append observability dashboard to workflow summary
        if: always()
        run: cat .ci/observability-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Save fast-lane timing state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ci/fast-lane-monitor-state.json
          key: fast-lane-monitor-${{ github.ref_name }}-${{ github.run_id }}

  test-contracts:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate verify-against policy report
        run: bun run ci:report:verify-against

      - name: Run contract tests
        run: bun run ci:test:contracts

  notes-governance:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run notes governance lane
        run: bun run ci:notes:governance

  render-parity:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run render parity lane
        run: bun run ci:test:render-parity

  native-render-contract:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run native render contract lane
        run: bun run ci:test:native-render-contract

  adapter-capabilities-contract:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run adapter capability contract lane
        run: bun run ci:test:adapter-capabilities-contract

  coverage-vitest:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest coverage lane
        run: bun run ci:test:coverage

      - name: Append coverage summary to workflow summary
        if: ${{ always() && hashFiles('.ci/coverage-summary.md') != '' }}
        run: cat .ci/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload internal coverage handoff
        if: ${{ always() && hashFiles('coverage/vitest/index.html') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-vitest-handoff
          path: |
            coverage/vitest
            .ci/coverage-summary.md

  repomix-reference-oracle:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run official Repomix reference-oracle smoke test
        run: bun run ci:smoke:repomix-reference-oracle

  bundle-update-matrix:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    strategy:
      matrix:
        transition: [style-change, section-change, asset-change]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bundle update transition test
        run: bun run ci:smoke:bundle-transition -- --transition "${{ matrix.transition }}"

  bun-compat-smoke:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    strategy:
      matrix:
        bun-version: ["1.3.11", "latest"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run runtime compatibility smoke lane
        run: bun run ci:test:compat

  reproducibility:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify reproducibility
        run: bun run ci:assurance:reproducibility

  release-assurance:
    runs-on: ubuntu-latest
    needs:
      - test-fast
      - test-contracts
      - notes-governance
      - render-parity
      - native-render-contract
      - adapter-capabilities-contract
      - coverage-vitest
      - repomix-reference-oracle
      - bundle-update-matrix
      - bun-compat-smoke
      - reproducibility
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run release assurance smoke
        run: bun run ci:assurance:release-integrity

  ci-artifacts:
    runs-on: ubuntu-latest
    needs:
      - release-assurance
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore fast-lane timing state
        uses: actions/cache/restore@v4
        with:
          path: .ci/fast-lane-monitor-state.json
          key: fast-lane-monitor-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            fast-lane-monitor-${{ github.ref_name }}-

      - name: Generate verify-against policy report
        run: bun run ci:report:verify-against

      - name: Generate observability dashboard
        run: bun run ci:report:observability

      - name: Append observability dashboard to workflow summary
        run: cat .ci/observability-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Download Vitest coverage handoff
        uses: actions/download-artifact@v4
        with:
          name: coverage-vitest-handoff
          path: .

      - name: Append downloaded coverage summary to workflow summary
        if: ${{ hashFiles('.ci/coverage-summary.md') != '' }}
        run: cat .ci/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verify-against policy report
        uses: actions/upload-artifact@v4
        with:
          name: verify-against-policy-report
          path: .ci/verify-against-policy-report.json

      - name: Upload observability dashboard
        uses: actions/upload-artifact@v4
        with:
          name: ci-observability
          path: |
            .ci/observability-summary.json
            .ci/observability-summary.md

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/vitest
