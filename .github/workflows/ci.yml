name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUN_MIN_VERSION: 1.3.11

jobs:
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint, format, and typecheck
        run: bun run lint && bun run format:check && bun run check

      - name: Build
        run: bun run build

      - name: Guard fast unit lane composition
        run: bun run ci:guard:fast-lane

      - name: Run fast unit test lane
        run: bun run ci:test:fast

  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run contract tests
        run: bun run ci:test:contracts

  repomix-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repomix-version: ["1.13.1-cx.1", "1.13.1-cx.3", "1.13.1-cx.4"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set Repomix adapter version
        run: bun add --exact @wsmy/repomix-cx-fork@${{ matrix.repomix-version }}

      - name: Build
        run: bun run build

      - name: Run adapter smoke test
        run: bun run ci:smoke:repomix-version

  bundle-update-matrix:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    strategy:
      matrix:
        transition: [style-change, section-change, asset-change]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bundle update transition test
        run: bun run ci:smoke:bundle-transition -- --transition "${{ matrix.transition }}"

  bun-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.3.11", "latest"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run deterministic test lane
        run: bun run ci:test:all

  reproducibility:
    runs-on: ubuntu-latest
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify reproducibility
        run: bun run ci:assurance:reproducibility

  release-assurance:
    runs-on: ubuntu-latest
    needs:
      - test-fast
      - test-contracts
      - repomix-matrix
      - bundle-update-matrix
      - bun-matrix
      - reproducibility
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run release assurance smoke
        run: bun run ci:assurance:release-integrity
