name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

  repomix-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repomix-version: 1.13.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set Repomix version
        run: bun add --exact repomix@${{ matrix.repomix-version }}

      - name: Build
        run: bun run build

      - name: Run adapter smoke test
        run: bun run smoke:repomix-version

  bundle-update-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        transition: [style-change, section-change, asset-change]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bundle update transition test
        run: bun test tests/bundle/update-matrix.test.ts -t "${{ matrix.transition }}"
