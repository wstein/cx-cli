name: Release artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional package version for manual publish.'
        required: false
        default: ''
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Preflight release secrets
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required for npm publish."
            missing=1
          fi
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is required for Homebrew tap updates."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Determine release version
        id: release-version
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = 'workflow_dispatch' ]; then
            requested_version="${{ github.event.inputs.version }}"
            if [ -z "$requested_version" ]; then
              requested_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
            fi
          else
            requested_version=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$requested_version" >> $GITHUB_OUTPUT

      - name: Validate package version matches tag or input
        run: |
          set -euo pipefail
          pkg_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          requested_version="${{ steps.release-version.outputs.version }}"
          if [ "$pkg_version" != "$requested_version" ]; then
            echo "Package version ($pkg_version) does not match git tag or provided version ($requested_version)."
            exit 1
          fi

      - name: Build package
        run: bun run build

      - name: Setup npm auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate Homebrew formula
        run: |
          mkdir -p homebrew-formula
          bun run scripts/generate-homebrew-formula.ts "${{ steps.release-version.outputs.version }}" --output homebrew-formula/cx-cli.rb

      - name: Validate formula syntax
        run: ruby -c homebrew-formula/cx-cli.rb

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: wstein/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update tap formula
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -b main
          mkdir -p Formula
          cp ../homebrew-formula/cx-cli.rb Formula/cx-cli.rb
          if git diff --quiet -- Formula/cx-cli.rb; then
            echo "No formula updates required."
            exit 0
          fi
          git add Formula/cx-cli.rb
          git commit -m "chore(homebrew): update cx-cli formula for v${{ steps.release-version.outputs.version }}"
          git push origin main
