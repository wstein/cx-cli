name: Publish Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: publish-pages
  cancel-in-progress: false

env:
  BUN_MIN_VERSION: 1.3.11

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_pages_publish: ${{ steps.publish-gate.outputs.run_pages_publish }}
      run_release_publish: ${{ steps.publish-gate.outputs.run_release_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Determine publish eligibility
        id: publish-gate
        run: |
          set -euo pipefail
          echo "run_pages_publish=false" >> "$GITHUB_OUTPUT"
          echo "run_release_publish=false" >> "$GITHUB_OUTPUT"

          if [ "${GITHUB_EVENT_NAME}" = 'workflow_dispatch' ]; then
            echo "run_pages_publish=true" >> "$GITHUB_OUTPUT"
            tag_name=$(git tag --points-at HEAD --list 'v*' | head -n 1 || true)
            if [ -n "$tag_name" ]; then
              echo "run_release_publish=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            exit 0
          fi

          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "run_pages_publish=true" >> "$GITHUB_OUTPUT"
          fi

          tag_name=$(git tag --points-at HEAD --list 'v*' | head -n 1 || true)
          if [ -n "$tag_name" ]; then
            echo "run_release_publish=true" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: gate
    if: needs.gate.outputs.run_pages_publish == 'true' || needs.gate.outputs.run_release_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate schema files
        run: bun test tests/config/schema.test.ts tests/config/schema-integration.test.ts

  publish-pages:
    needs:
      - gate
      - validate
    if: needs.gate.outputs.run_pages_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_MIN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate coverage report
        run: bun run ci:test:coverage

      - name: Stage Pages site
        run: bun run pages:build

      - name: Smoke-check staged Pages site
        id: pages-smoke
        continue-on-error: true
        run: bun run pages:smoke

      - name: Report non-blocking Pages smoke failure
        if: always() && steps.pages-smoke.outcome == 'failure'
        run: |
          {
            echo "## Pages smoke warning"
            echo
            echo "The staged \`site/\` tree failed the smoke check, but publish remained non-blocking."
            echo "Review the \`Smoke-check staged Pages site\` step before trusting the public output."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dist/site
          force_orphan: true

  publish-release:
    needs:
      - gate
      - validate
    if: needs.gate.outputs.run_release_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            schemas/cx-config-v1.schema.json
            schemas/cx-config-overlay-v1.schema.json
            schemas/manifest-v5.schema.json
            schemas/manifest-v6.schema.json
