name: Publish Schemas

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: publish-schemas
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_publish: ${{ steps.publish-gate.outputs.run_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Determine publish eligibility
        id: publish-gate
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = 'workflow_dispatch' ]; then
            echo "run_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag_name=$(git tag --points-at HEAD --list 'v*' | head -n 1 || true)
          if [ -z "$tag_name" ]; then
            echo "run_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_publish=true" >> "$GITHUB_OUTPUT"

  validate:
    needs: gate
    if: needs.gate.outputs.run_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate schema files
        run: bun test tests/config/schema.test.ts tests/config/schema-integration.test.ts

  publish-pages:
    needs:
      - gate
      - validate
    if: needs.gate.outputs.run_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage Pages site
        run: bun run pages:build

      - name: Publish Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          force_orphan: true

  publish-release:
    needs:
      - gate
      - validate
    if: needs.gate.outputs.run_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            schemas/cx-config-v1.schema.json
            schemas/cx-config-overlay-v1.schema.json
            schemas/manifest-v5.schema.json
            schemas/manifest-v6.schema.json
