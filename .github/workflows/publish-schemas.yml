name: Publish Schemas

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-schemas
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate schema files
        run: bun test tests/config/schema.test.ts tests/config/schema-integration.test.ts

  publish-pages:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage schema site
        run: |
          set -eu
          rm -rf site
          mkdir -p site/schemas
          cp schemas/*.json site/schemas/
          {
            printf '%s\n' '<!doctype html>'
            printf '%s\n' '<html lang="en">'
            printf '%s\n' '  <head>'
            printf '%s\n' '    <meta charset="utf-8" />'
            printf '%s\n' '    <meta name="viewport" content="width=device-width, initial-scale=1" />'
            printf '%s\n' '    <meta http-equiv="refresh" content="0; url=schemas/" />'
            printf '%s\n' '    <title>CX Schemas</title>'
            printf '%s\n' '  </head>'
            printf '%s\n' '  <body>'
            printf '%s\n' '    <p><a href="schemas/">Open the schema index.</a></p>'
            printf '%s\n' '  </body>'
            printf '%s\n' '</html>'
          } > site/index.html
          {
            printf '%s\n' '<!doctype html>'
            printf '%s\n' '<html lang="en">'
            printf '%s\n' '  <head>'
            printf '%s\n' '    <meta charset="utf-8" />'
            printf '%s\n' '    <meta name="viewport" content="width=device-width, initial-scale=1" />'
            printf '%s\n' '    <title>CX Schemas</title>'
            printf '%s\n' '    <style>'
            printf '%s\n' '      body {'
            printf '%s\n' '        font-family: system-ui, sans-serif;'
            printf '%s\n' '        line-height: 1.5;'
            printf '%s\n' '        max-width: 48rem;'
            printf '%s\n' '        margin: 3rem auto;'
            printf '%s\n' '        padding: 0 1.5rem;'
            printf '%s\n' '      }'
            printf '%s\n' '      code, a { word-break: break-word; }'
            printf '%s\n' '    </style>'
            printf '%s\n' '  </head>'
            printf '%s\n' '  <body>'
            printf '%s\n' '    <h1>CX Schemas</h1>'
            printf '%s\n' '    <p>The canonical JSON Schemas for <code>cx</code> are published here.</p>'
            printf '%s\n' '    <ul>'
            for schema_file in site/schemas/*.json; do
              schema_name=$(basename "$schema_file")
              printf '%s\n' "      <li><a href=\"${schema_name}\">${schema_name}</a></li>"
            done
            printf '%s\n' '    </ul>'
            printf '%s\n' '    <p>GitHub Releases mirror the same files as immutable snapshots.</p>'
            printf '%s\n' '    <p>The npm package also ships <code>schemas/</code> for offline use.</p>'
            printf '%s\n' '  </body>'
            printf '%s\n' '</html>'
          } > site/schemas/index.html
          touch site/.nojekyll

      - name: Publish Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          force_orphan: true

  publish-release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            schemas/cx-config-v1.schema.json
            schemas/cx-config-overlay-v1.schema.json
            schemas/manifest-v5.schema.json
            schemas/manifest-v6.schema.json
