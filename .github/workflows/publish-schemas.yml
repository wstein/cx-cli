name: Publish Schemas

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-schemas
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate schema files
        run: bun test tests/config/schema.test.ts tests/config/schema-integration.test.ts

  publish-pages:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage schema site
        run: |
          set -eu
          rm -rf site
          mkdir -p site/schemas
          cp schemas/*.json site/schemas/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>CX Schemas</title>
              <style>
                body {
                  font-family: system-ui, sans-serif;
                  line-height: 1.5;
                  max-width: 48rem;
                  margin: 3rem auto;
                  padding: 0 1.5rem;
                }
                code, a { word-break: break-word; }
              </style>
            </head>
            <body>
              <h1>CX Schemas</h1>
              <p>The canonical JSON Schemas for <code>cx</code> are published here.</p>
              <ul>
                <li><a href="schemas/cx-config-v1.schema.json">cx-config-v1.schema.json</a></li>
                <li><a href="schemas/cx-config-overlay-v1.schema.json">cx-config-overlay-v1.schema.json</a></li>
                <li><a href="schemas/manifest-v6.schema.json">manifest-v6.schema.json</a></li>
              </ul>
              <p>GitHub Releases mirror the same files as immutable snapshots.</p>
              <p>The npm package also ships <code>schemas/</code> for offline use.</p>
            </body>
          </html>
          HTML
          printf 'cx-cli.dev\n' > site/CNAME
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            schemas/cx-config-v1.schema.json
            schemas/cx-config-overlay-v1.schema.json
            schemas/manifest-v5.schema.json
            schemas/manifest-v6.schema.json
