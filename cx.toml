schema_version = 1
project_name = "myproject"
source_root = "."
output_dir = "~/Downloads/repomix-cx-cli/"

[repomix]
style = "xml"
compress = false
remove_comments = false
remove_empty_lines = false
show_line_numbers = false
include_empty_directories = false
security_check = true

[files]
exclude = [".git/**", "node_modules/**", "dist/**"]
follow_symlinks = false
unmatched = "ignore"

[dedup]
mode = "fail"
order = "config"

[manifest]
format = "toon"
include_file_sha256 = true
include_output_sha256 = true
include_output_spans = false
include_source_metadata = true

[checksums]
algorithm = "sha256"
file_name = "{project}.sha256"

[assets]
include = ["**/*.{png,jpg,jpeg,gif,webp,svg,pdf}"]
exclude = []
mode = "copy"
target_dir = "{project}-assets"

[sections.docs]
include = ["docs/**", "README.md", "*.md"]
exclude = []

[sections.src]
include = ["src/**"]
exclude = []
