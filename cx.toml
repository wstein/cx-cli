#:schema https://wstein.github.io/cx-cli/schemas/cx-config-v1.schema.json

schema_version = 1
project_name = "cx-cli"
source_root = "."
output_dir = "dist/{project}-bundle"

[output.extensions]
xml = ".xml.txt"
json = ".json.txt"
markdown = ".md"
plain = ".txt"

[repomix]
style = "xml"
show_line_numbers = false
include_empty_directories = false
security_check = true

[files]
# include is intentionally empty: the VCS-controlled file list is the master base.
# Add patterns here only to pull in generated or deliberately git-ignored files.
include = []
exclude = [
  "node_modules/**",
  "dist/**",
  "tmp/**",
  "*.lock",
  "**/*.lock",
  "package-lock.json",
]
follow_symlinks = false
unmatched = "ignore"

[dedup]
mode = "fail"
order = "config"
require_explicit_ownership = true

[manifest]
format = "json"
pretty = true
include_file_sha256 = true
include_output_sha256 = true
include_output_spans = true
include_source_metadata = true

# Set pretty = false to produce compact single-line manifests (smaller files, CI-friendly).

[handover]
include_repo_history = true
repo_history_count = 25

[notes]
strict_notes_mode = false
fail_on_drift_pressured_notes = false

[notes.frontmatter.fields.tags]
required = false
type = "string_array"
values = ["/^[a-z][a-z0-9-]*$/"]

[checksums]
algorithm = "sha256"
file_name = "{project}.sha256"

[tokens]
encoding = "o200k_base"

[assets]
include = ["**/*.{png,jpg,jpeg,gif,webp,svg,pdf}"]
exclude = ["tests/fixtures/**"]
mode = "copy"
target_dir = "assets"
layout = "flat"

[docs]
target_dir = "."
root_level = 1

[sections.docs]
include = [
  "docs/**",
  "README.md",
  "*.md",
  ".github/pull_request_template.md",
  ".github/release-body-template.md",
  "antora-playbook.yml",
]
exclude = []

[sections.notes]
include = ["notes/**"]
exclude = []

[sections.unassigned]
catch_all = true

[sections.src]
include = ["src/**"]
exclude = []

[sections.tests]
include = ["tests/**", "tests/fixtures/**"]
exclude = []
