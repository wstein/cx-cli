#:schema https://wstein.github.io/cx-cli/schemas/cx-config-v1.schema.json

schema_version = 1
project_name = "cx-cli"
source_root = "."
output_dir = "dist/{project}-bundle"

[output.extensions]
xml = ".xml.txt"
json = ".json.txt"
markdown = ".md"
plain = ".txt"

[repomix]
style = "xml"
show_line_numbers = false
include_empty_directories = false
security_check = true

[files]
# include is intentionally empty: the VCS-controlled file list is the master base.
# Add patterns here only to pull in generated or deliberately git-ignored files.
include = []
exclude = ["node_modules/**", "dist/**", "tmp/**", "tests/fixtures/**"]
follow_symlinks = false
unmatched = "ignore"

[dedup]
mode = "fail"
order = "config"
require_explicit_ownership = true

[manifest]
format = "json"
pretty = true
include_file_sha256 = true
include_output_sha256 = true
include_output_spans = true
include_source_metadata = true

# Set pretty = false to produce compact single-line manifests (smaller files, CI-friendly).

[handover]
include_repo_history = true
repo_history_count = 25

[checksums]
algorithm = "sha256"
file_name = "{project}.sha256"

[tokens]
encoding = "o200k_base"

[assets]
include = ["**/*.{png,jpg,jpeg,gif,webp,svg,pdf}"]
exclude = []
mode = "copy"
target_dir = "assets"
layout = "flat"

[docs]
target_dir = "."

[sections.docs]
include = ["docs/**", "notes/**", "README.md", "*.md"]
exclude = []

[sections.repo]
include = [
  ".gitignore",
  ".github/workflows/ci.yml",
  "biome.json",
  "bin/cx",
  "cx.toml",
  "scripts/**",
  "schemas/**",
  "package.json",
  "tsconfig.json",
  "tsconfig.test.json",
]
exclude = []

[sections.src]
include = ["src/**"]
exclude = []

[sections.tests]
include = ["tests/**"]
exclude = []
