#:schema ./schemas/cx-config-v1.schema.json
extends = "./cx.toml"

[mcp]
# Default agent client configurations for common MCP workflows.
# These values are included for downstream agent tooling and workflow hints.
# Unknown fields are accepted by the MCP profile loader.

[mcp.clients.claude]
provider = "anthropic"
model = "claude-3.5"
capabilities = ["text", "code", "reasoning"]
description = "High-capacity Claude profile for reasoning and code-aware workflows."

[mcp.clients.github_copilot]
provider = "github"
model = "copilot"
capabilities = ["code", "review", "completion"]
description = "GitHub Copilot profile for repository-aware coding assistance."

[mcp.clients.codex]
provider = "openai"
model = "code-davinci-002"
capabilities = ["code", "completion"]
description = "OpenAI Codex profile for code generation workflows."
