[test]
coverageSkipTestFiles = true
timeout = 20000
# Keep the default Bun config lean; explicit full-proof lanes opt into
# coverage, reruns, and randomization through bunfig.full.toml.

[test.coverageThreshold]
line = { per_file = 0.80, summary = 0.95 }
function = { per_file = 0.80, summary = 0.95 }
statement = { per_file = 0.80, summary = 0.95 }
branch = { per_file = 0.80, summary = 0.95 }
