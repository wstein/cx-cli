[test]
coverage = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true
randomize = true
rerunEach = 2
timeout = 20000
# Keep raw `bun test` aligned with `make test` by defaulting discovery to
# unit-test directories only. Full-suite commands use bunfig.full.toml.
pathIgnorePatterns = [
	"tests/bundle/**",
	"tests/cli/**",
	"tests/config/**",
	"tests/contracts/**",
	"tests/manifest/**",
	"tests/mcp/**",
	"tests/notes/**",
	"tests/planning/**",
	"tests/repomix/**",
	"tests/shared/**",
	"tests/vcs/**",
]

[test.coverageThreshold]
line = { per_file = 0.80, summary = 0.95 }
function = { per_file = 0.80, summary = 0.95 }
statement = { per_file = 0.80, summary = 0.95 }
branch = { per_file = 0.80, summary = 0.95 }
