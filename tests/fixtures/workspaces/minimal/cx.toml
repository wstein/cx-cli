schema_version = 1
project_name = "demo"
source_root = "."
output_dir = "dist/demo-bundle"

[output.extensions]
xml = ".xml.txt"
json = ".json.txt"
markdown = ".md"
plain = ".txt"

[repomix]
style = "xml"
show_line_numbers = false
include_empty_directories = false
security_check = false
missing_extension = "warn"

[files]
include = []
exclude = ["dist/**"]
follow_symlinks = false
unmatched = "ignore"

[dedup]
mode = "fail"
order = "config"

[manifest]
format = "json"
pretty = true
include_file_sha256 = true
include_output_sha256 = true
include_output_spans = true
include_source_metadata = true
include_linked_notes = false

[checksums]
algorithm = "sha256"
file_name = "demo.sha256"

[tokens]
encoding = "o200k_base"

[assets]
include = ["**/*.png"]
exclude = []
mode = "copy"
target_dir = "demo-assets"
layout = "flat"

[config]
duplicate_entry = "fail"

[mcp]
policy = "default"
audit_logging = true

[sections.docs]
include = ["README.md"]
exclude = []

[sections.src]
include = ["src/**"]
exclude = []